services:
- type: web
  name: project-roadmap
  env: python
  plan: free
  buildCommand: pip install -r requirements.txt
  startCommand: python3 server.py
  envVars:
  - key: PYTHON_VERSION
    value: 3.9
  - key: DATABASE_URL
    fromDatabase:
      name: task-gantt-db
      property: connectionString

- type: pserv
  name: task-gantt-db
  env: postgres
  plan: free
  ipAllowList: []
